server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # index.html must stay fresh because it points to hashed JS/CSS assets.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # 静态资源优先处理
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 前端路由支持 (SPA) - 仅对非静态资源生效
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理
    location ~ ^/(agent-api/)?(get_answer|upload_doc|hot_questions|feedback|reprocess_docs|debug|guest-token|token|register|sso-login|captcha|admin|api|documents|pending_docs|download_doc|download_source|approve_doc|reject_doc) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 允许大文件上传 (例如 100MB)
        client_max_body_size 100M;
    }
}
