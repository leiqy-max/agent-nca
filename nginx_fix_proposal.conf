# Nginx 配置修改建议
# 对应文件: /usr/local/nginx/conf/nginx.conf (或您的具体路径)

# 问题原因:
# 全局配置了 'add_header X-Frame-Options SAMEORIGIN;'，导致 iframe 嵌套被浏览器拦截。
# 即使是同源，某些浏览器或特定网络环境下(如经过代理)也可能判定失败。
# 且 React 应用作为独立 SPA 嵌套在 Vue 应用中，需要独立的 try_files 规则。

server {
    listen 6001;
    listen [::]:6001;
    # 根目录指向 dist (根据您的描述: /usr/local/nginx/dist/m 是模块目录)
    # 这里 root 可以是 /usr/local/nginx/dist/，然后 location 中用 alias
    root /usr/local/nginx/dist/;

    # ... 其他配置 ...

    # -----------------------------------------------------------
    # 新增/修改以下 Location 块
    # -----------------------------------------------------------

    # 1. 外层 Vue 容器 (NC 模块入口)
    # 访问路径: http://IP:6001/m/demo/
    location /m/demo/ {
        # 指向 Vue 构建产物目录
        alias /usr/local/nginx/dist/m/demo/;
        index index.html;
        
        # 路由支持: 找不到文件时回退到 Vue 的 index.html
        try_files $uri $uri/ /m/demo/index.html;

        # 【安全配置建议】
        # 场景 A: 如果 NC 门户和 Agent 在完全相同的域名和端口下 -> 使用 SAMEORIGIN
        # add_header X-Frame-Options SAMEORIGIN;
        
        # 场景 B (常见): 如果 NC 门户在端口 80，Agent 在 6001 -> 视为跨域，SAMEORIGIN 会拦截。
        # 解决方法: 移除 X-Frame-Options，改用 CSP 白名单机制。
        
        # 第一步: 移除旧的 X-Frame-Options (因为它不支持白名单)
        add_header X-Frame-Options "";
        
        # 第二步: 使用 Content-Security-Policy 指定允许嵌入的父级域名
        # frame-ancestors 'self': 允许同源(即本服务自己的域名端口)嵌入
        # http://10.30.107.187:6001: 允许您的 NC 门户嵌入 (根据您的确认，门户也在 6001)
        add_header Content-Security-Policy "frame-ancestors 'self' http://10.30.107.187:6001;";
    }

    # 2. 内嵌 React 助手 (Iframe 内容)
    # 访问路径: http://IP:6001/m/demo/agent-ui/
    location /m/demo/agent-ui/ {
        alias /usr/local/nginx/dist/m/demo/agent-ui/;
        index index.html;
        try_files $uri $uri/ /m/demo/agent-ui/index.html;

        # 【安全配置建议】同上
        add_header X-Frame-Options "";
        # 允许自身(6001)以及 NC 门户(10.30.107.187:6001) 嵌入此页面
        add_header Content-Security-Policy "frame-ancestors 'self' http://10.30.107.187:6001;";
    }

    # 3. 后端 API 转发
    # 访问路径: http://IP:6001/agent-api/xxx
    location /agent-api/ {
        # 注意: 
        # 1. 不要使用反引号 (`)
        # 2. 如果后端已经支持 /agent-api/ 前缀，proxy_pass 后面就不要带路径
        # 3. 如果后端只支持 / (如 /get_answer)，则 proxy_pass 需要带上 / 来截断路径
        
        # 假设您的 Python 后端在 10.30.107.176:9020
        # 且后端已配置 app.include_router(..., prefix="/agent-api")
        # 此时应保留 /agent-api/ 前缀传给后端:
        proxy_pass http://10.30.107.176:9020/agent-api/;
        
        # 必要的头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # WebSocket 支持 (流式输出需要)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
}
