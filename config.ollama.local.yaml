database:
  host: "localhost"
  port: 5432
  user: "ops_user"
  password: "ops_password"
  dbname: "ops_agent"

llm:
  provider: "ollama"
  ollama_base_url: "http://127.0.0.1:11434"
  model: "qwen2.5:1.5b"
  embedding_model: "nomic-embed-text:latest"
  embedding_dimension: 768
  timeout: 120
  embedding_timeout: 120
  classify_timeout: 15
  classify_num_predict: 8
  classify_num_ctx: 512
  intent_classify_enabled: false
  rag_timeout: 45
  rag_num_predict: 256
  rag_num_ctx: 2048
  rag_temperature: 0.1
  ollama_keep_alive: "30m"

retrieval:
  vector_top_k: 12
  keyword_top_k: 20
  bm25_top_k: 20
  bm25_max_docs: 50000
  fusion_top_k: 20
  final_top_k: 5
  rrf_k: 60
  rerank_enabled: true
  rerank_provider: "local"
  rerank_endpoint: ""
  rerank_timeout: 30
  context_expand_window: 1
  rag_context_max_chars: 3200
  short_query_max_chars: 3
  create_vector_index: true

server:
  host: "0.0.0.0"
  port: 9020
